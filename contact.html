<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact | EndoPeak</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#1a1a2e}
.header{background:#0d1b2a;padding:.75rem 1.5rem}
.header a{color:#e8a020;font-weight:700;font-size:1.2rem;text-decoration:none}
.content{max-width:580px;margin:3rem auto;padding:2.5rem;background:#fff;border-radius:1rem;box-shadow:0 2px 16px rgba(0,0,0,.06)}
h1{font-size:1.75rem;font-weight:800;color:#0d1b2a;margin-bottom:.5rem}
p{font-size:.9rem;color:#4a5568;line-height:1.7;margin-bottom:1.25rem}
label{display:block;font-size:.8rem;font-weight:600;color:#1a1a2e;margin-bottom:.35rem}
input,textarea{width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:.75rem;font-family:inherit;font-size:.9rem;margin-bottom:1rem;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:#e8a020}
textarea{height:120px;resize:vertical}
button{width:100%;background:linear-gradient(135deg,#e8a020,#ff6b35);color:#fff;font-weight:700;font-size:1rem;padding:.875rem;border:none;border-radius:60px;cursor:pointer;transition:all .2s}
button:hover{opacity:.9;transform:translateY(-1px)}
.note{font-size:.75rem;color:#94a3b8;text-align:center;margin-top:.75rem}
.footer{text-align:center;padding:1.5rem;font-size:.75rem;color:#94a3b8}
</style>
</head>
<body>
<div class="header"><a href="index.html">← EndoPeak</a></div>
<div class="content">
<h1>Contact Us</h1>
<p>Have a question or need help? Fill out the form below and we'll get back to you within 24–48 hours.</p>
<form action="https://formsubmit.co/your@email.com" method="POST">
  <label>Your Name</label>
  <input type="text" name="name" placeholder="John Smith" required>
  <label>Email Address</label>
  <input type="email" name="email" placeholder="john@example.com" required>
  <label>Subject</label>
  <input type="text" name="subject" placeholder="Question about EndoPeak">
  <label>Message</label>
  <textarea name="message" placeholder="How can we help you?" required></textarea>
  <button type="submit">Send Message</button>
  <p class="note">We typically respond within 1–2 business days.</p>
</form>
</div>
<div class="footer">© 2026 EndoPeak Review. All rights reserved.</div>
</body>
</html>
